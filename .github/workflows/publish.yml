name: Publish and release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: publish-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  verify:
    name: Verify release
    runs-on: ubuntu-latest
    outputs:
      crate_version: ${{ steps.version.outputs.crate_version }}

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches crate version
        id: version
        shell: bash
        run: |
          crate_version="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "ditto-cli") | .version')"
          if [[ "v${crate_version}" != "${RELEASE_TAG}" ]]; then
            echo "::error::Tag ${RELEASE_TAG} does not match crate version ${crate_version}"
            exit 1
          fi
          echo "crate_version=${crate_version}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: cargo test --locked

  publish:
    name: Publish to crates.io
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check publication status
        id: published
        shell: bash
        env:
          CRATE_VERSION: ${{ needs.verify.outputs.crate_version }}
        run: |
          if cargo info "ditto-cli@${CRATE_VERSION}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "ditto-cli ${CRATE_VERSION} is already published"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate with crates.io
        if: steps.published.outputs.exists != 'true'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        if: steps.published.outputs.exists != 'true'
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  build:
    name: Build ${{ matrix.target }}
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: macos-15-intel
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package Unix binary
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          mkdir -p dist
          tar -C "target/${{ matrix.target }}/release" \
            -czf "dist/ditto-cli-${RELEASE_TAG}-${{ matrix.target }}.tar.gz" \
            ditto-cli

      - name: Package Windows binary
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Compress-Archive `
            -Path "target/${{ matrix.target }}/release/ditto-cli.exe" `
            -DestinationPath "dist/ditto-cli-${env:RELEASE_TAG}-${{ matrix.target }}.zip"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub release
    needs:
      - publish
      - build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" > /dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" dist/* \
              --clobber \
              --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${RELEASE_TAG}" dist/* \
              --generate-notes \
              --title "Ditto CLI ${RELEASE_TAG}" \
              --verify-tag \
              --repo "${GITHUB_REPOSITORY}"
          fi
